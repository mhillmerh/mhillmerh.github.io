<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maximiliano Hillmer | Doom Portafolio</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <section id="introScreen" class="intro-screen">
    <div class="intro-overlay"></div>

    <div class="intro-content">
      <img
        src="assets/images/portafolio.png"
        alt="Doom Portafolio"
        class="doom-logo"
      />
      <button id="pressStartBtn" class="press-start-btn">PRESS START</button>
      <p class="start-hint">Haz click o presiona Enter</p>
    </div>
  </section>

  <div id="doorTransition" class="door-transition hidden">
    <div class="door left-door"></div>
    <div class="door right-door"></div>
  </div>

  <div id="appShell" class="app-shell hidden">
    <div class="container-fluid">
      <div class="row g-0 min-vh-100">
        <aside class="col-12 col-lg-3 sidebar-panel">
          <div class="sidebar-inner">
            <div class="logo-box">
              <p class="logo-pretitle">UAC // MARINE PORTFOLIO</p>
              <h1 class="logo-title">DOOM<br>PORTAFOLIO</h1>
              <p class="logo-subtitle">Maximiliano Hillmer</p>
            </div>

            <nav class="main-menu">
              <button class="menu-btn active" data-screen="home">Home</button>
              <button class="menu-btn" data-screen="about">About</button>
              <button class="menu-btn" data-screen="projects">Projects</button>
              <button class="menu-btn" data-screen="technologies">Technologies</button>
              <button class="menu-btn" data-screen="certifications">Certifications</button>
              <button class="menu-btn" data-screen="social">Social</button>
              <button class="menu-btn" data-screen="credits">Credits</button>
              <button class="menu-btn" data-screen="arcade">Arcade</button>
            </nav>

            <div class="sidebar-audio-controls">
              <button id="musicToggleBtn" class="music-toggle-btn" type="button">
                AUDIO: ON
              </button>
            </div>
          </div>
        </aside>

        <main class="col-12 col-lg-9 main-panel">
          <div class="content-frame" id="screenContainer">
            <div class="loading-screen">
              <p>Cargando módulo...</p>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="assets/sounds/At Doom's Gate.wav" type="audio/wav" />
  </audio>

  <audio id="doorSound" preload="auto">
    <source src="assets/sounds/doom_door.wav" type="audio/wav" />
  </audio>

  <audio id="switchSound" preload="auto">
    <source src="assets/sounds/doom_switch.wav" type="audio/wav" />
  </audio>

  <audio id="creditsMusic" loop preload="auto">
    <source src="assets/sounds/Victory.wav" type="audio/mpeg" />
  </audio>

<script src="js/intro.js"></script>
<script src="js/projects.js"></script>
<script src="js/technologies.js"></script>
<script src="js/certifications.js"></script>
<script src="js/social.js"></script>
<script src="js/credits.js"></script>
<script src="js/sections-loader.js"></script>
<script src="js/navigation.js"></script>
<script src="js/main.js"></script>
</body>
</html>
